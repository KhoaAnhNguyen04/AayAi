<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Source Sync Configuration</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>

  <body
    class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden"
  >
    <aside
      class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shrink-0"
    >
      <div class="p-6 border-b border-slate-200">
        <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2.5">
          <i data-lucide="box" class="w-5 h-5 text-blue-600"></i>
          <span>System UI</span>
        </h1>
      </div>

      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <a
          href="./index.html"
          class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition"
        >
          <i data-lucide="database" class="w-4 h-4 text-slate-400"></i>
          Data Sources
        </a>

        <a
          href="./configurations.html"
          class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg bg-blue-50 text-blue-700 border border-blue-200 transition"
        >
          <i data-lucide="settings-2" class="w-4 h-4 text-blue-600"></i>
          Configuration
        </a>

        <a
          href="./duplicates.html"
          class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition"
        >
          <i data-lucide="copy-check" class="w-4 h-4 text-slate-400"></i>
          Duplicate Documents
        </a>
      </nav>

      <div class="p-4 border-t border-slate-200">
        <div
          class="flex justify-center items-center gap-2 px-4 py-2 bg-slate-200 text-slate-500 text-sm font-semibold rounded-lg"
        >
          <i data-lucide="message-square" class="w-4 h-4"></i>
          Chatbot chỉ chạy local
        </div>
      </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto bg-slate-50">
      <div class="p-8 max-w-7xl mx-auto w-full space-y-8">
        <div>
          <h2 class="text-2xl font-semibold text-slate-900">
            Source Sync Configuration
          </h2>
          <p class="text-sm text-slate-500 mt-1">
            Cấu hình thời gian hệ thống tự động đồng bộ tài liệu theo từng
            source.
          </p>
        </div>

        <section
          class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden"
        >
          <div class="p-5 border-b border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
              <div class="relative">
                <i
                  data-lucide="search"
                  class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"
                ></i>
                <input
                  id="configSearchInput"
                  type="text"
                  placeholder="Search source, folder, status..."
                  class="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500"
                />
              </div>

              <select
                id="configFilterSource"
                class="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500"
              >
                <option value="">Tất cả Source</option>
              </select>

              <select
                id="configFilterStatus"
                class="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500"
              >
                <option value="">Tất cả Status</option>
                <option value="true">Enabled</option>
                <option value="false">Paused</option>
              </select>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
              <thead
                class="bg-slate-50 border-b border-slate-200 text-slate-500"
              >
                <tr>
                  <th class="px-6 py-3 font-medium">Source</th>
                  <th class="px-6 py-3 font-medium">Sync Status</th>
                  <th class="px-6 py-3 font-medium">Sync Interval</th>
                  <th class="px-6 py-3 font-medium">Next Run</th>
                  <th class="px-6 py-3 font-medium">Updated At</th>
                  <th class="px-6 py-3 font-medium">Action</th>
                </tr>
              </thead>

              <tbody
                id="configurationTableBody"
                class="divide-y divide-slate-100"
              ></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./static/app.js"></script>
  </body>
</html>
