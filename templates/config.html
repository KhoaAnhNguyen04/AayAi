<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Cấu hình Hệ thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; /* Màu thanh cuộn sáng hơn */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden"
  >
    {% include 'sidebar.html' %}

    <main class="flex-1 flex flex-col overflow-y-auto bg-slate-50">
      <div class="p-8 max-w-7xl mx-auto w-full space-y-8">
        <div>
          <h2 class="text-2xl font-semibold text-slate-900">
            Data Sources & Configuration
          </h2>
          <p class="text-sm text-slate-500 mt-1">
            Quản lý nguồn dữ liệu và cấu hình kết nối AI của hệ thống.
          </p>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
          <div class="flex items-center gap-2 mb-4">
            <i data-lucide="sliders" class="w-4 h-4 text-blue-600"></i>
            <h3 class="text-lg font-medium text-slate-900">
              Cấu hình Model AI
            </h3>
          </div>

          <form
            action="/save-config"
            method="post"
            class="grid grid-cols-1 md:grid-cols-2 gap-6"
          >
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2"
                >OpenAI/Gemini API Key</label
              >
              <div class="relative">
                <input
                  id="apiKeyInput"
                  type="password"
                  name="api_key"
                  value="{{ api_key }}"
                  placeholder="Nhập API Key..."
                  class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm pr-10"
                />
                <button
                  type="button"
                  id="toggleBtn"
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600"
                >
                  <i id="eyeIcon" data-lucide="eye" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2"
                >System Prompt</label
              >
              <textarea
                name="prompt"
                rows="1"
                class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm resize-none"
              >
{{ prompt }}</textarea
              >
            </div>
            <div class="md:col-span-2 flex justify-end">
              <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition shadow-sm shadow-blue-600/20"
              >
                Lưu Cấu Hình
              </button>
            </div>
          </form>
        </div>

        <div class="bg-transparent">
          <div
            class="overflow-x-auto border border-slate-200 rounded-xl bg-white shadow-sm"
          >
            <table class="w-full text-sm text-left whitespace-nowrap">
              <thead
                class="text-xs text-slate-500 uppercase border-b border-slate-200 bg-slate-50"
              >
                <tr>
                  <th class="px-6 py-4 font-semibold">Source</th>
                  <th class="px-6 py-4 font-semibold">Folder</th>
                  <th class="px-6 py-4 font-semibold">Status</th>
                  <th class="px-6 py-4 font-semibold">Indexed Docs</th>
                  <th class="px-6 py-4 font-semibold">Last Sync</th>
                  <th class="px-6 py-4 font-semibold">Last Result</th>
                  <th
                    class="px-6 py-4 font-semibold flex justify-between items-center"
                  >
                    Actions
                    <i
                      data-lucide="copy"
                      class="w-4 h-4 text-slate-400 cursor-pointer hover:text-slate-600 transition"
                    ></i>
                  </th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
      // Gọi lại lucide.createIcons() để render icon ở giao diện ban đầu
      lucide.createIcons();

      // Script ẩn hiện mật khẩu
      const apiKeyInput = document.getElementById("apiKeyInput");
      const toggleBtn = document.getElementById("toggleBtn");
      const eyeIcon = document.getElementById("eyeIcon");

      toggleBtn.addEventListener("click", () => {
        if (apiKeyInput.type === "password") {
          apiKeyInput.type = "text";
          eyeIcon.setAttribute("data-lucide", "eye-off");
        } else {
          apiKeyInput.type = "password";
          eyeIcon.setAttribute("data-lucide", "eye");
        }
        lucide.createIcons();
      });
    </script>
  </body>
</html>
