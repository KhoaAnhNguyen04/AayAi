<div
  class="overflow-x-auto border border-slate-200 rounded-xl bg-white shadow-sm"
>
  <table class="w-full text-sm text-left whitespace-nowrap">
    <thead
      class="text-xs text-slate-500 uppercase border-b border-slate-200 bg-slate-50"
    >
      <tr>
        <th class="px-6 py-4 font-semibold">Source</th>
        <th class="px-6 py-4 font-semibold">Folder</th>
        <th class="px-6 py-4 font-semibold">Status</th>
        <th class="px-6 py-4 font-semibold">Indexed Docs</th>
        <th class="px-6 py-4 font-semibold">Last Sync</th>
        <th class="px-6 py-4 font-semibold">Last Result</th>
        <th class="px-6 py-4 font-semibold flex justify-between items-center">
          Actions
          <i
            data-lucide="copy"
            class="w-4 h-4 text-slate-400 cursor-pointer hover:text-slate-600 transition"
          ></i>
        </th>
      </tr>
    </thead>

    <tbody id="tableAddRow" class="border-b border-slate-100 bg-slate-50/30">
      <tr
        id="inlineAddTriggerRow"
        class="group cursor-pointer hover:bg-blue-50/50 transition-colors"
      >
        <td colspan="7" class="p-0">
          <div
            onclick="window.app.toggleInlineAdd()"
            class="flex items-center justify-center py-2 text-blue-600 opacity-70 group-hover:opacity-100 transition-opacity"
          >
            <i data-lucide="plus" class="w-4 h-4 mr-1"></i>
            <span class="text-xs font-semibold uppercase tracking-wider"
              >Thêm Knowledge Source Mới</span
            >
          </div>
        </td>
      </tr>

      <tr id="inlineAddInputRow" class="hidden bg-blue-50/40">
        <td colspan="7" class="px-6 py-4">
          <div class="flex items-start gap-4">
            <div
              class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0"
            >
              <i data-lucide="link-2" class="w-5 h-5 text-blue-600"></i>
            </div>
            <div class="flex-1">
              <label class="block text-xs font-medium text-slate-500 mb-1"
                >Dán URL của hệ thống (Google Drive, Confluence,
                GitLab...)</label
              >
              <input
                type="text"
                id="inlineUrlInput"
                class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white"
                placeholder="https://..."
              />

              <div
                id="inlineAddError"
                class="mt-2 text-xs text-rose-600 hidden flex items-center gap-1"
              >
                <i
                  data-lucide="alert-circle"
                  class="w-3.5 h-3.5 flex-shrink-0"
                ></i>
                <span id="inlineErrorText"></span>
              </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-2 mt-5">
              <button
                onclick="window.app.cancelInlineAdd()"
                class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-100 rounded-lg transition-colors shadow-sm"
              >
                Hủy
              </button>
              <button
                onclick="window.app.confirmInlineAdd()"
                class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm"
              >
                Lưu cấu hình
              </button>
            </div>
          </div>
        </td>
      </tr>
    </tbody>

    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
  </table>
</div>
