<div class="flex flex-col md:flex-row gap-4 mb-4 items-center justify-between">
  <div class="flex flex-col sm:flex-row flex-1 gap-3 w-full">
    <div class="relative flex-1 max-w-md">
      <div
        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
      >
        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
      </div>
      <input
        type="text"
        id="searchInput"
        class="block w-full pl-10 pr-3 py-2 border border-slate-200 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
        placeholder="Tìm kiếm theo tên Folder..."
      />
    </div>
    <div class="flex flex-wrap gap-2">
      <select
        id="filterSource"
        class="bg-white border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer transition-colors min-w-[130px]"
      >
        <option value="">Tất cả Source</option>
      </select>
      <select
        id="filterStatus"
        class="bg-white border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer transition-colors min-w-[130px]"
      >
        <option value="">Tất cả Status</option>
      </select>
      <select
        id="filterResult"
        class="bg-white border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer transition-colors min-w-[130px]"
      >
        <option value="">Tất cả Result</option>
      </select>
    </div>
  </div>
</div>
